server.port=8080
server.servlet.context-path=/api

# ===========================================
# DATABASE CONFIGURATION
# Open this file, update the 3 values below
# with your PostgreSQL credentials, then save.
# ===========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/smartinterview
spring.datasource.username=postgres
spring.datasource.password=170706
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT  - change this to any random long string in production
jwt.secret=SmartInterview_SuperSecret_Key_Change_This_In_Production_2024
jwt.expiration=86400000

# Email (optional - app works without it, emails are just skipped)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=jahnavi1776@gmail.com
spring.mail.password=snickers@17
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.smartinterview=INFO
logging.level.org.springframework.security=WARN

# Gemini API Key
gemini.api.key=YOUR_GEMINI_API_KEY
server.error.include-stacktrace=always
